# Shared configuration served by the Config Server to ALL services
# (every <service>.yml inherits and can override these).

# Eureka registration endpoint, now sourced centrally.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# Custom pagination settings (consumed by business-service via @Value with
# code-level defaults, so services still start if the config server is down).
application:
  pagination:
    default-page-size: 10
    max-page-size: 50

# Demoable, safe-to-change-at-runtime properties. Change these in this file (or in a
# per-service file below) and POST /actuator/refresh to see the new value live.
app:
  message: "Hello from Spring Cloud Config Server (shared default)"
  features:
    beta-enabled: false
