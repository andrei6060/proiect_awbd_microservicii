spring:
  application:
    name: db-service
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB

springdoc:
  default-produces-media-type: application/json

server:
  servlet:
    context-path: /api/v1/

# Service discovery: registers this service with Eureka. defaultZone is overridable
# via the EUREKA_URL env var for containerized deployments.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true