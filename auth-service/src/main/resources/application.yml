spring:
  application:
    name: auth-service
  profiles:
    active: dev
  # Centralized config (modern Spring Boot 3 mechanism, NOT bootstrap.yml).
  # 'optional:' lets the service start even if the config server is down.
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}"
  servlet:
    multipart:
      max-file-size: 50MB

springdoc:
  default-produces-media-type: application/json

server:
  servlet:
    context-path: /api/v1/

# Expose the refresh endpoint so centralized properties can be re-read at runtime.
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus, refresh
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true            # /actuator/health/liveness and /readiness
  health:
    circuitbreakers:
      enabled: true              # surfaces circuit breaker state in /actuator/health
  metrics:
    tags:
      application: ${spring.application.name}   # label every metric with the service name
    distribution:
      percentiles-histogram:
        http.server.requests: true              # enables latency histograms/percentiles
  # Distributed tracing (bonus). Apps still start if Zipkin is down.
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URL:http://localhost:9411/api/v2/spans}

# NOTE: eureka.* now comes from the Config Server (config-repo/application.yml).

# Fault tolerance for inter-service calls to db-service (kept local for availability).
# Shared by the Spring Cloud CircuitBreakerFactory, the health indicator and metrics.
resilience4j:
  circuitbreaker:
    instances:
      db-service:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      db-service:
        max-attempts: 3
        wait-duration: 300ms
        retry-exceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
  timelimiter:
    instances:
      db-service:
        timeout-duration: 12s
        cancel-running-future: true
