spring:
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 50
        one-indexed-parameters: false

springdoc:
  default-produces-media-type: application/json

server:
  servlet:
    context-path: /api/v1/

application:
  pagination:
    default-page-size: 10
    max-page-size: 50