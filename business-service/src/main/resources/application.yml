spring:
  application:
    name: business-service
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 50MB
  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 50
        one-indexed-parameters: false

springdoc:
  default-produces-media-type: application/json

server:
  servlet:
    context-path: /api/v1/

application:
  pagination:
    default-page-size: 10
    max-page-size: 50

# Service discovery: registers this service with Eureka. defaultZone is overridable
# via the EUREKA_URL env var for containerized deployments.
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true